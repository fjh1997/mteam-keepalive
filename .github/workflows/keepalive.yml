name: M-Team keepalive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run mtlogin
        run: |
          docker run --rm \
            -e USERNAME="${{ secrets.MT_USERNAME }}" \
            -e PASSWORD="${{ secrets.MT_PASSWORD }}" \
            -e TOTPSECRET="${{ secrets.MT_TOTPSECRET }}" \
            ghcr.io/${{ github.repository_owner }}/mtlogin:latest
