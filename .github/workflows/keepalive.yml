name: M-Team 保活

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/scjtqs2/mtlogin:edge
    env:
      USERNAME: ${{ secrets.MT_USERNAME }}
      PASSWORD: ${{ secrets.MT_PASSWORD }}
      TOTPSECRET: ${{ secrets.MT_TOTPSECRET }}
      CRONTAB: ''
    steps:
      - name: 运行 mtlogin 保活
        run: /app/mtlogin
