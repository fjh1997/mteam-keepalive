name: M-Team keepalive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download token cache
        uses: actions/download-artifact@v4
        with:
          name: mteam-data
          path: data
        continue-on-error: true

      - name: Run mtlogin
        run: |
          mkdir -p data
          docker run --rm \
            -v ${{ github.workspace }}/data:/data \
            -e USERNAME="${{ secrets.MT_USERNAME }}" \
            -e PASSWORD="${{ secrets.MT_PASSWORD }}" \
            -e TOTPSECRET="${{ secrets.MT_TOTPSECRET }}" \
            ghcr.io/${{ github.repository_owner }}/mtlogin:latest

      - name: Upload token cache
        uses: actions/upload-artifact@v4
        with:
          name: mteam-data
          path: data/
          retention-days: 90
        if: always()
